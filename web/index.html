<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="intera_edu">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>intera_edu</title>
  <link rel="manifest" href="manifest.json">

  <!--
    Google Identity Services (B-03 — Login com Google).
    Para ativar:
      1. Crie um OAuth 2.0 Client ID em https://console.cloud.google.com/apis/credentials
         tipo "Web application", com "Authorized JavaScript origins" = http://localhost:8090
      2. Copie o Client ID e substitua o placeholder abaixo (mantenha o sufixo .apps.googleusercontent.com)
      3. Configure também a variável GOOGLE_CLIENT_ID no docker-compose.yml do auth-service
    Enquanto vazio, o botão "Continuar com Google" exibe um aviso ao usuário.
  -->
  <meta name="google-signin-client_id" content="">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    // Inicializa GIS quando o script carrega e o Flutter chama window.interaeduInitGoogleSignIn().
    // Resolve uma Promise com o credential (ID token) na primeira aprovação.
    window.interaeduGoogleSignIn = function () {
      return new Promise(function (resolve, reject) {
        var meta = document.querySelector('meta[name="google-signin-client_id"]');
        var clientId = meta ? meta.content : '';
        if (!clientId) {
          reject(new Error('NOT_CONFIGURED'));
          return;
        }
        if (!window.google || !window.google.accounts || !window.google.accounts.id) {
          reject(new Error('GIS_NOT_LOADED'));
          return;
        }
        window.google.accounts.id.initialize({
          client_id: clientId,
          callback: function (response) {
            if (response && response.credential) {
              resolve(response.credential);
            } else {
              reject(new Error('NO_CREDENTIAL'));
            }
          },
        });
        window.google.accounts.id.prompt(function (notification) {
          // Se o popup é fechado/skip, força fallback de exibição
          if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
            reject(new Error('USER_DISMISSED'));
          }
        });
      });
    };
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
