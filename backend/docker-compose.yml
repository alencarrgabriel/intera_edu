version: '3.8'

services:
  # ──────────────────────────────────────────
  # Infrastructure
  # ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: interaedu-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: interaedu
      POSTGRES_USER: interaedu
      POSTGRES_PASSWORD: interaedu_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U interaedu -d interaedu']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: interaedu-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: interaedu-minio
    restart: unless-stopped
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # ──────────────────────────────────────────
  # Application Services
  # ──────────────────────────────────────────
  gateway:
    build:
      context: .          # backend/ root — provides package-lock.json for npm ci
      dockerfile: gateway/Dockerfile
    container_name: interaedu-gateway
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      SERVICE_PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
      PROFILE_SERVICE_URL: http://profile-service:3002
      FEED_SERVICE_URL: http://feed-service:3003
      MESSAGING_SERVICE_URL: http://messaging-service:3004
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: change-me-to-a-random-64-char-string-in-production
    depends_on:
      redis:
        condition: service_healthy

  auth-service:
    build:
      context: .          # backend/ root — provides package-lock.json for npm ci
      dockerfile: auth-service/Dockerfile
    container_name: interaedu-auth-service
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: development
      SERVICE_NAME: auth-service
      SERVICE_PORT: 3001
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: interaedu
      DATABASE_USERNAME: interaedu
      DATABASE_PASSWORD: interaedu_dev_password
      DATABASE_SCHEMA: auth
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: change-me-to-a-random-64-char-string-in-production
      JWT_REFRESH_SECRET: change-me-to-another-random-64-char-string-in-production
      JWT_ACCESS_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  profile-service:
    build:
      context: .
      dockerfile: profile-service/Dockerfile
    container_name: interaedu-profile-service
    restart: unless-stopped
    ports:
      - '3002:3002'
    environment:
      NODE_ENV: development
      SERVICE_NAME: profile-service
      SERVICE_PORT: 3002
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: interaedu
      DATABASE_USERNAME: interaedu
      DATABASE_PASSWORD: interaedu_dev_password
      DATABASE_SCHEMA: profile
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: change-me-to-a-random-64-char-string-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  feed-service:
    build:
      context: .
      dockerfile: feed-service/Dockerfile
    container_name: interaedu-feed-service
    restart: unless-stopped
    ports:
      - '3003:3003'
    environment:
      NODE_ENV: development
      SERVICE_NAME: feed-service
      SERVICE_PORT: 3003
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: interaedu
      DATABASE_USERNAME: interaedu
      DATABASE_PASSWORD: interaedu_dev_password
      DATABASE_SCHEMA: feed
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: change-me-to-a-random-64-char-string-in-production
      PROFILE_SERVICE_URL: http://profile-service:3002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  messaging-service:
    build:
      context: .
      dockerfile: messaging-service/Dockerfile
    container_name: interaedu-messaging-service
    restart: unless-stopped
    ports:
      - '3004:3004'
    environment:
      NODE_ENV: development
      SERVICE_NAME: messaging-service
      SERVICE_PORT: 3004
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: interaedu
      DATABASE_USERNAME: interaedu
      DATABASE_PASSWORD: interaedu_dev_password
      DATABASE_SCHEMA: messaging
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: change-me-to-a-random-64-char-string-in-production
      PROFILE_SERVICE_URL: http://profile-service:3002
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: interaedu
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
