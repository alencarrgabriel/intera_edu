name: Build APK

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: 'API Base URL'
        required: true
        default: 'http://187.127.16.75:3000/api/v1'
      ws_base_url:
        description: 'WebSocket Base URL'
        required: true
        default: 'http://187.127.16.75:3004'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable

      - run: flutter pub get

      - run: flutter build apk --release
          --dart-define=API_BASE_URL=${{ github.event.inputs.api_base_url }}
          --dart-define=WS_BASE_URL=${{ github.event.inputs.ws_base_url }}

      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
