<!DOCTYPE html>

<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>InteraEdu - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",

            extend: {

                "error": "#9e3f4e",

                "on-primary": "#f9f6ff",
                "tertiary-dim": "#47536b",
                "tertiary-fixed": "#d1ddfa",
                "on-primary-fixed": "#203498",
                "primary-container": "#dee0ff",
                "on-tertiary": "#f8f8ff",
                "on-error": "#fff7f7",
                "on-tertiary-fixed-variant": "#4c5870",
                "surface-container-highest": "#e3e1ec",
                "outline-variant": "#b2b1bb",
                "tertiary": "#535f78",
                "on-background": "#31323a",
                "on-primary-container": "#3648ac",
                "inverse-surface": "#0e0e11",
                "surface-container": "#efedf4",
                "on-error-container": "#782232",
                "inverse-on-surface": "#9e9ca0",
                "surface": "#fbf8fc",
                "surface-dim": "#dad9e5",
                "secondary-container": "#e3e1ec",

              fontFamily: {
                "headline": ["Manrope"],
                "body": ["Inter"],
                "label": ["Inter"]

              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fbf8fc;
        }
        .font-headline {
            font-family: 'Manrope', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface min-h-screen flex flex-col">
<!-- Top Navigation Bar - Suppressed according to Shell Visibility Rule (Transactional screen) -->
<main class="flex-grow flex items-center justify-center px-6 py-12">
<div class="w-full max-w-md space-y-10">
<!-- Branding & Header Section -->
<div class="text-center space-y-4">
<div class="flex justify-center mb-6">
<div class="p-3 rounded-xl bg-surface-container-high shadow-sm">
<span class="text-2xl font-extrabold tracking-tighter text-primary font-headline">InteraEdu</span>
</div>
</div>
<h1 class="text-3xl font-bold font-headline text-on-surface tracking-tight">Bem-vindo de volta.</h1>
<p class="text-on-surface-variant font-body text-sm">Continue sua jornada de conhecimento e colaboração.</p>
</div>
<!-- Login Form Container -->
<div class="bg-surface-container-lowest p-8 rounded-xl shadow-sm space-y-6">
<form class="space-y-5">
<!-- E-mail Input -->
<div class="space-y-1.5">
<label class="block text-xs font-semibold text-on-surface-variant ml-1" for="email">E-mail</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none focus:ring-2 focus:ring-primary-container text-on-surface rounded-lg px-4 py-3 placeholder:text-outline-variant text-sm transition-all outline-variant/15 outline" id="email" placeholder="nome@universidade.edu.br" type="email"/>
</div>
<p class="text-[10px] text-secondary ml-1">Seus dados estão protegidos sob a LGPD.</p>
</div>
<!-- Password Input -->
<div class="space-y-1.5">
<label class="block text-xs font-semibold text-on-surface-variant ml-1" for="password">Senha</label>
<div class="relative group">
<input class="w-full bg-surface-container-low border-none focus:ring-2 focus:ring-primary-container text-on-surface rounded-lg px-4 py-3 placeholder:text-outline-variant text-sm transition-all outline-variant/15 outline" id="password" type="password" value="••••••••"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
<div class="flex justify-between items-center mt-1 px-1">
<!-- Error Message Display -->
<p class="text-xs text-error font-medium">Credenciais inválidas. Tente novamente.</p>
<a class="text-xs font-semibold text-primary-dim hover:underline transition-all" href="#">Esqueci minha senha</a>
</div>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full bg-gradient-to-br from-primary to-primary-dim text-on-primary font-bold py-3.5 rounded-lg shadow-sm active:scale-95 transition-all duration-200 text-sm tracking-wide" type="submit">
                            Entrar
                        </button>
</div>
</form>
<!-- Divider -->
<div class="relative flex items-center py-2">
<div class="flex-grow h-px bg-surface-container-high"></div>
<span class="flex-shrink mx-4 text-[10px] font-bold text-outline-variant uppercase tracking-widest">ou</span>
<div class="flex-grow h-px bg-surface-container-high"></div>
</div>
<!-- Secondary Connection Options -->
<div class="grid grid-cols-1 gap-3">
<button class="flex items-center justify-center gap-3 w-full bg-surface-container-high hover:bg-surface-container-highest text-on-surface font-medium py-3 rounded-lg transition-colors text-sm">
<img alt="" class="w-4 h-4 opacity-80" data-alt="Google authentication logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDIKBpbJOTrEvsci9-fywi7DZLtls9OH3YezsAK2XSSV6nA6BDpEMNEzWZuZ8GHSLGuFXfOGWFp7SZabkfNmeEL_NsvAbFCZGMq_EWAa9_Ar2Jz_ykXinAQHJcjN-RV2t3wxTb7RXPWMZamduBZyYzKLTQ6QlhUREc194S32cPKUfwbcBmsA-VbCTG9ctlHoYGv366xuuzlN7f9i94I_8Ajkzp0jfVZkc0YnswHPXCCZKQUFL_dJYHM3NvgbwFbdmj1vxHS-x0pC58"/>
                        Continuar com Google
                    </button>
</div>
</div>
<!-- Footer Links -->
<p class="text-center text-sm text-on-surface-variant">
                Não possui uma conta? 
                <a class="text-primary font-bold hover:underline transition-all" href="#">Criar conta acadêmica</a>
</p>
</div>
</main>
<!-- Content-driven Illustration (Asymmetric Editorial Style) -->
<div class="hidden lg:block fixed bottom-0 right-0 w-1/3 h-full -z-10 opacity-10">
<div class="absolute inset-0 bg-gradient-to-tl from-primary-container to-transparent"></div>
<div class="h-full w-full flex items-center justify-center p-20">
<div class="relative w-full aspect-square border-2 border-primary-dim/20 rounded-full flex items-center justify-center">
<div class="w-3/4 aspect-square border-2 border-primary-dim/10 rounded-full"></div>
<div class="absolute top-10 left-10 w-4 h-4 bg-primary-dim rounded-full"></div>
<div class="absolute bottom-20 right-5 w-8 h-8 bg-tertiary-dim rounded-full"></div>
</div>
</div>
</div>
</body></html>
